<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lastoviak // Magnetometer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #ff5f00; --bg: #1a1a1a; --panel: #262626; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: Helvetica, sans-serif; text-align: center; padding: 20px; }
        .container { border: 1px solid #333; padding: 20px; background: var(--panel); max-width: 800px; margin: auto; border-top: 4px solid var(--accent); }
        canvas { background: #000; margin-top: 20px; }
        .footer { margin-top: 20px; font-size: 0.7em; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MAGNETIC_FIELD_ANALYSIS</h2>
        <canvas id="magChart" width="800" height="400"></canvas>
        <div class="footer">UNIT: LSTVK-7742 // OPERATOR: LASTOVIAK Y.</div>
    </div>

    <script>
        const ctx = document.getElementById('magChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [
                    { label: 'X-Axis', data: [], borderColor: '#ff5f00', borderWidth: 2, tension: 0.2, pointRadius: 0 },
                    { label: 'Y-Axis', data: [], borderColor: '#00ff00', borderWidth: 2, tension: 0.2, pointRadius: 0 },
                    { label: 'Z-Axis', data: [], borderColor: '#00ccff', borderWidth: 2, tension: 0.2, pointRadius: 0 }
                ]
            },
            options: {
                animation: false,
                scales: { y: { grid: { color: '#333' }, ticks: { color: '#888' } }, x: { display: false } },
                plugins: { legend: { labels: { color: '#e0e0e0' } } }
            }
        });

        const ws = new WebSocket(`ws://${window.location.hostname}/ws`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            chart.data.datasets[0].data.push(data.x);
            chart.data.datasets[1].data.push(data.y);
            chart.data.datasets[2].data.push(data.z);
            if (chart.data.datasets[0].data.length > 50) {
                chart.data.datasets.forEach(d => d.data.shift());
            }
            chart.update();
        };
    </script>
</body>
</html>
